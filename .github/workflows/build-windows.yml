name: Build (Windows)

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
    paths:
      - "**/*.cpp"
      - "**/*.h"
      - "**/*.hpp"
      - "**/CMakeLists.txt"
      - "vcpkg.json"
      - ".github/workflows/build-windows.yml"

permissions:
  contents: read
  actions: write  # Required for vcpkg GitHub Actions binary cache (x-gha)

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    name: Build Release
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v5

      - name: Cache vcpkg installed directory
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/vcpkg_installed
            ${{ github.workspace }}/build/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "fb67f8d52560208f80b08db2528631a73a6e0d0c"

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -S . -G "Visual Studio 18 2026" -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=x64-windows ^
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: cmd
        run: |
          cmake --build build --config Release --parallel

      - name: Run tests
        if: success()
        shell: cmd
        continue-on-error: true
        run: |
          setlocal enabledelayedexpansion
          for /r build %%f in (*_test.exe *_test_main.exe test_main.exe) do (
            echo Running: %%f
            %%f || echo ::warning::Test failed: %%f
          )

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-Release
          path: |
            build/**/*.dll
            build/**/*.lib
            build/**/*.exe
            build/**/*.pdb
          retention-days: 14
