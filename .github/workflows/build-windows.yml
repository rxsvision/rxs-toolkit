name: Build (Windows)

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
    paths:
      - "**/*.cpp"
      - "**/*.h"
      - "**/*.hpp"
      - "**/CMakeLists.txt"
      - "vcpkg.json"
      - ".github/workflows/build-windows.yml"

permissions:
  contents: read

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    name: Build ${{ matrix.config }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Release, Debug]

    steps:
      - uses: actions/checkout@v5

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "fb67f8d52560208f80b08db2528631a73a6e0d0c"

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=x64-windows ^
            -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Build
        shell: cmd
        run: |
          cmake --build build --config ${{ matrix.config }} --parallel

      - name: Run tests
        if: matrix.config == 'Release'
        shell: cmd
        run: |
          setlocal enabledelayedexpansion
          for /r build %%f in (*_test.exe *_test_main.exe test_main.exe) do (
            echo Running: %%f
            %%f || echo ::warning::Test failed: %%f
          )
        continue-on-error: true

      - name: Upload build artifacts
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.config }}
          path: |
            build/**/*.dll
            build/**/*.lib
            build/**/*.exe
            build/**/*.pdb
          retention-days: 14
