name: Encoding Check
on:
  pull_request:
    branches: [main, develop]
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'

jobs:
  encoding-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for GBK encoded files
        shell: powershell
        run: |
          $gbkFiles = @()
          $sourceFiles = Get-ChildItem -Recurse -Include "*.cpp","*.h","*.hpp" -File |
            Where-Object { $_.FullName -notmatch '\\(x64|x86|Debug|Release|build|out|vcpkg_installed|\.vs|packages)\\' }

          foreach ($f in $sourceFiles) {
              $bytes = [System.IO.File]::ReadAllBytes($f.FullName)
              # Skip UTF-8 BOM
              if ($bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF) {
                  continue
              }
              # Check for high bytes (GBK indicator)
              $hasGBK = $false
              for ($i = 0; $i -lt [Math]::Min($bytes.Length, 1000); $i++) {
                  if ($bytes[$i] -ge 0x80) { $hasGBK = $true; break }
              }
              if ($hasGBK) {
                  $gbkFiles += $f.FullName
              }
          }

          if ($gbkFiles.Count -gt 0) {
              Write-Host "::error::Found $($gbkFiles.Count) GBK-encoded files. All source files must be UTF-8."
              foreach ($f in $gbkFiles) {
                  Write-Host "  GBK: $f"
              }
              exit 1
          } else {
              Write-Host "::notice::All source files are UTF-8 encoded. Encoding check passed."
          }
